name: Neuroscience Weekly Tracker

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一 10:00 北京时间
  workflow_dispatch:     # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 给机器人写入权限，解决push报错
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          # 关键：关闭缓存，彻底解决requirements.txt报错
          cache: 'no'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4

      - name: Run tracker script
        run: |
          # 检查文件存在，避免空跑
          if [ -f "tracker.py" ]; then
            python tracker.py
          else
            echo "❌ tracker.py not found in root directory!"
            exit 1
          fi
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 无变更时不报错
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update weekly paper list $(date +'%Y-%m-%d')"
          git push || git commit -m "Auto-update weekly paper list $(date +'%Y-%m-%d')"
          git push
