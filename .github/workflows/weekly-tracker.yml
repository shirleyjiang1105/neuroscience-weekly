name: Neuroscience Weekly Tracker

on:
  schedule:
    - cron: '0 2 * * 1'  # 每周一 10:00 北京时间
  workflow_dispatch:     # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 给机器人写入权限
    steps:
      - name: Checkout code
        uses: actions/checkout@v5  # 升级到v5，解决Node.js警告
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6  # 升级到v6，支持Node.js24
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests beautifulsoup4

      - name: Run tracker script
        run: |
          if [ -f "tracker.py" ]; then
            python tracker.py
          else
            echo "❌ tracker.py not found in root directory!"
            exit 1
          fi
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 关键：用单引号包裹commit message，彻底解决引号语法错误
          if ! git diff --quiet; then
            git commit -m 'Auto-update weekly paper list'
            git push
          fi
